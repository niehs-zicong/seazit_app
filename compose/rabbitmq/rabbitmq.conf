# /etc/rabbitmq/rabbitmq.conf
listeners.tcp = none
listeners.ssl.default = 5671
ssl_options.cacertfile = /etc/rabbitmq/certs/certificate.crt;
ssl_options.certfile = /etc/rabbitmq/certs/certificate.crt;
ssl_options.keyfile = /etc/rabbitmq/certs/certificate_key.pem;

ssl_options.verify = verify_peer
ssl_options.fail_if_no_peer_cert = true
auth_mechanisms.1 = PLAIN
auth_mechanisms.2 = EXTERNAL
