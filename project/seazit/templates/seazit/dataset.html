{% extends "seazit/base.html" %}

{% block title %}{{block.super}} | Quality Control{% endblock %}

{% block content %}
<div id='main'></div>
{% if ENVIRONMENT_NAME == 'Production' %}

<iframe id='iframeApp' frameborder=0 
        src="https://rstudio.niehs.nih.gov/143/"></iframe>   
 {% else %} 
 <iframe id='iframeApp' frameborder=0 
        src="https://sandbox-staging.ntp.niehs.nih.gov/rsconnect/content/143/"></iframe> 
{% endif %}

{% endblock content %}

{% block extra-js %}
<script>
  window.apps.seazit.renderQualityControl(document.getElementById('main'));
  window.apps.resizeIframe(document.getElementById('iframeApp'));
</script>
{% endblock extra-js %}
